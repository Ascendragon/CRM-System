services:
  app:
    build:
      context: ./docker/php
    container_name: crm-system-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - crm-system

  nginx:
    image: nginx:1.30-alpine
    container_name: crm-system-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crm-system

  postgres:
    image: postgres:17-alpine
    container_name: crm-system-postgres
    environment:
      POSTGRES_DB: crm_system
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-system

  redis:
    image: redis:7.4-alpine
    container_name: crm-system-redis
    ports:
      - "6380:6379"
    networks:
      - crm-system

volumes:
  postgres_data:

networks:
  crm-system:
    driver: bridge
